<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚙️ 械式對決</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#07071a;color:#eee;font-family:'Noto Sans TC',sans-serif;}
#app{max-width:520px;margin:0 auto;padding:10px 16px 20px;}
h1{font-family:'Noto Serif TC',serif;font-size:18px;color:#a29bfe;letter-spacing:4px;text-shadow:0 0 20px #6c5ce7;}
.btn{padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;font-weight:700;letter-spacing:1px;line-height:1.2;}
.btn:active{filter:brightness(0.85);}
.btn:disabled{opacity:0.35;cursor:default;}
.btn-move{background:#1e1e3a;color:#fdcb6e;border:1px solid #f39c12;}
.btn-move.active{background:#f39c12;color:#07071a;}
.btn-skill{background:#1e1e3a;color:#a29bfe;border:1px solid #6c5ce7;}
.btn-rest{background:#1e1e3a;color:#00b894;border:1px solid #00b894;}
.btn-end{background:#1e1e3a;color:#555;border:1px solid #d63031;}
.btn-end.ready{background:#d63031;color:#fff;}
.board{display:grid;gap:2px;justify-content:center;margin-bottom:10px;}
.cell{display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:default;position:relative;transition:all 0.12s;user-select:none;border:1px solid #2a2a40;background:#0b0b1e;}
.cell.highlight{cursor:pointer;}
.cell.blocked{background:#3d1a1a;}
.cell-content{text-align:center;line-height:1.1;}
.hp-bar-wrap{width:100%;height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:2px;}
.hp-bar{height:100%;border-radius:3px;transition:width 0.4s;}
.panel{background:#0d0d2b;border:1px solid #2d2d44;border-radius:8px;padding:8px 10px;margin-bottom:8px;}
.turn-bar{display:flex;align-items:center;justify-content:space-between;background:#0d0d2b;border-radius:8px;padding:7px 12px;margin-bottom:8px;}
.overlay{position:fixed;inset:0;background:#000000bb;display:flex;align-items:center;justify-content:center;z-index:100;}
.overlay-box{background:#0d0d2b;border-radius:14px;padding:28px 32px;text-align:center;max-width:300px;}
.char-card{cursor:pointer;border-radius:10px;padding:10px 12px;transition:all 0.2s;text-align:center;flex:1 1 80px;min-width:80px;}
.char-card:hover{filter:brightness(1.15);}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.skill-list{display:flex;gap:6px;flex-wrap:wrap;}
.hp-bars-row{display:flex;gap:8px;margin-bottom:8px;}
.hp-unit-box{flex:1;background:#0d0d2b;border-radius:8px;padding:7px 10px;}
.info-panel{background:#0d0d2b;border:1px solid #2d2d44;border-radius:8px;padding:10px;margin-bottom:8px;font-size:10px;display:flex;gap:8px;flex-wrap:wrap;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
/* Card styles */
.card-hand{display:flex;gap:5px;flex-wrap:wrap;padding:6px 0;}
.card-item{border-radius:8px;padding:6px 8px;cursor:pointer;transition:all 0.15s;flex:1 1 calc(33% - 5px);min-width:90px;max-width:calc(33% - 5px);text-align:left;position:relative;}
.card-item:hover{filter:brightness(1.2);transform:translateY(-2px);}
.card-item.card-fa{background:#1a1a3a;border:1px solid #a29bfe;}
.card-item.card-fu{background:#1a2a1a;border:1px solid #00b894;}
.card-item.card-selected{box-shadow:0 0 12px #fdcb6e88;border-color:#fdcb6e;}
.card-item.card-disabled{opacity:0.4;cursor:default;pointer-events:none;}
.card-badge{font-size:8px;padding:1px 4px;border-radius:3px;display:inline-block;font-weight:700;letter-spacing:1px;}
.card-badge-fa{background:#a29bfe33;color:#a29bfe;}
.card-badge-fu{background:#00b89433;color:#00b894;}
/* Trap on board */
.trap-icon{position:absolute;top:1px;right:1px;font-size:9px;opacity:0.8;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const BOARD_ROWS = 5;
const BOARD_COLS = 7;
const DICE_SIDES = 12;
const STEALTH_MOVE_RANGE = 2;
const REST_HEAL = 1;
const REST_CAP_RATIO = 0.5;
const PARRY_DICE = 3;
const KNOCKBACK_DMG = 1;
const LINE_RANGE = 2;
const MAX_HAND = 3;

// ─── Card Data ────────────────────────────────────────────────────────────────
const CARD_DATA = [
  {
    id:"遙控骰", name:"遙控骰子", type:"法",
    icon:"🎲", color:"#a29bfe",
    desc:"下一次擲骰結果可自由 +2 或 -2",
    flavor:"「我骰子裡灌了鉛，你咬我啊？」",
  },
  {
    id:"春日影", name:"春日影", type:"法",
    icon:"🌸", color:"#fd79a8",
    desc:"強制敵方重新擲骰一次，必須接受第二次的結果",
    flavor:"「為什麼要演奏春日影！」",
  },
  {
    id:"瞬身之術", name:"瞬身之術", type:"法",
    icon:"💨", color:"#74b9ff",
    desc:"選擇己方一個單位，移動至周圍任意格",
    flavor:"「原諒我，這是最後一次了。」",
  },
  {
    id:"銅鑼燒", name:"銅鑼燒", type:"伏",
    icon:"🍩", color:"#fdcb6e",
    desc:"觸發者恢復 2 點生命值（不可超過血量上限）",
    flavor:"「感受到藍色狸貓的恨意」",
  },
  {
    id:"獄門疆", name:"獄門疆", type:"伏",
    icon:"⛓️", color:"#e17055",
    desc:"觸發者行動立即終止，且下一回合定身",
    flavor:"「呦！好久不見」",
  },
  {
    id:"不義遊戲", name:"不義遊戲", type:"法",
    icon:"🔀", color:"#55efc4",
    desc:"選擇兩個單位，彼此交換位置",
    flavor:"「所謂拍手，是靈魂的喝采！」",
  },
  {
    id:"星光連流擊", name:"星光連流擊", type:"伏",
    icon:"⭐", color:"#fdcb6e",
    desc:"觸發者往移動方向再移動兩格（不可穿過封路及單位）",
    flavor:"「快還要更快！」",
  },
  {
    id:"抹茶巴菲", name:"抹茶巴菲", type:"伏",
    icon:"🍵", color:"#00b894",
    desc:"觸發者下一次造成的傷害+1",
    flavor:"「可以吃了嗎？」",
  },
  {
    id:"上古詛咒", name:"上古詛咒", type:"伏",
    icon:"💀", color:"#b2bec3",
    desc:"觸發者兩回合內造成的傷害量 -1",
    flavor:"「我曾經是像你一樣的冒險家，直到我的膝蓋中了一箭。」",
  },
  {
    id:"散落樂高", name:"散落在地的樂高", type:"伏",
    icon:"🧱", color:"#e17055",
    desc:"觸發者受到 2 點傷害",
    flavor:"「世界上最硬、最尖銳、且完全合法的步兵殺手。」",
  },
];

function buildDeck() {
  // Each card appears twice, shared deck, shuffled
  let deck = [];
  CARD_DATA.forEach(c => { deck.push({...c}); deck.push({...c}); });
  // Fisher-Yates
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

// ─── Character Data ────────────────────────────────────────────────────────────
const CHAR_STATS = {
  爪牙: { hp:4, move:3 },
  劍士: { hp:5, move:2 },
  遊俠: { hp:4, move:1 },
};

const CHARACTERS = {
  爪牙: {
    name:"爪牙", hp:CHAR_STATS.爪牙.hp, maxHp:CHAR_STATS.爪牙.hp, move:CHAR_STATS.爪牙.move,
    color:"#c0392b",glowColor:"#ff6b6b",icon:"🐾",
    passive:{name:"嗜血",desc:"若擊殺單位則生命回到上限"},
    skills:[
      {range:[1,4],  name:"暗影步",  desc:`移動[${STEALTH_MOVE_RANGE}格內]並[潛行]`,      effect:"stealth_move"},
      {range:[4,11], name:"撕裂爪",  desc:"對[周圍]八格單位造成1點傷害",                  effect:"aoe_around_1"},
      {range:[10,12],name:"致命追擊",desc:"對全場已受傷單位造成1點[真傷]",                effect:"true_dmg_injured"},
    ],
  },
  劍士: {
    name:"劍士", hp:CHAR_STATS.劍士.hp, maxHp:CHAR_STATS.劍士.hp, move:CHAR_STATS.劍士.move,
    color:"#2980b9",glowColor:"#74b9ff",icon:"⚔️",
    passive:{name:"振刀",desc:`受傷時[判定](1~${PARRY_DICE})中1~2則-1受到傷害`},
    skills:[
      {range:[1,6], name:"彈反",   desc:"到下個回合前，受傷則判定1~3對造成傷害者1點傷害",effect:"parry"},
      {range:[7,9], name:"震地擊", desc:`擊退[相鄰]單位一格，若無法則造成${KNOCKBACK_DMG}點傷害`, effect:"knockback"},
      {range:[9,12],name:"千刃",   desc:"對[相鄰]一個單位造成2點傷害",                   effect:"adj_2dmg"},
    ],
  },
  遊俠: {
    name:"遊俠", hp:CHAR_STATS.遊俠.hp, maxHp:CHAR_STATS.遊俠.hp, move:CHAR_STATS.遊俠.move,
    color:"#27ae60",glowColor:"#55efc4",icon:"🏹",
    passive:{name:"養精蓄銳",desc:"若本回合沒有造成傷害，下回合第一次攻擊傷害+1"},
    skills:[
      {range:[1,5],  name:"疾射",  desc:`對直線${LINE_RANGE}格內的一名單位造成1點傷害`,             effect:"line_2_1dmg"},
      {range:[6,9],  name:"閃擊射",desc:`對直線${LINE_RANGE}格內一名單位造成1點傷害，並移動[周圍]`, effect:"shoot_move"},
      {range:[10,12],name:"裂空箭",desc:"選擇一條直線，沿線每個單位造成1點傷害",                    effect:"line_pierce"},
    ],
  },
};

// ─── State ────────────────────────────────────────────────────────────────────
let state = createInitialState();

function createInitialState() {
  return {
    phase:"setup",
    setupStep:1,
    p1Char:null, p2Char:null,
    board:[], blockedCells:[],
    currentPlayer:1,
    actionUsed:false,
    selectedAction:null,
    diceRoll:null,
    availableSkills:[],
    selectedSkill:null,
    highlightCells:[],
    log:["遊戲開始！"],
    winner:null,
    rangePowerNextTurn:{1:false,2:false},
    dealtDamageThisTurn:false,
    parryActive:{1:false,2:false},
    stealthActive:{1:false,2:false},
    showInfo:false,
    confirmQuit:false,
    rollAnim:false,
    // Card system
    deck: [],           // shared deck
    hands: {1:[], 2:[]}, // each player's hand
    traps: [],          // [{row, col, card, owner}] placed trap cards on board
    selectedCard: null, // index in current player's hand
    cardMode: null,     // null | 'select_target' | 'set_trap'
    diceBonusNextRoll: {1:0, 2:0},   // from 遙控骰子
    dmgBonusNextAtk:  {1:0, 2:0},   // from 抹茶巴菲
    dmgPenaltyTurns:  {1:0, 2:0},   // from 上古詛咒 (turns remaining)
    rootedTurns:      {1:0, 2:0},   // from 獄門疆 (turns remaining)
    forceRerollActive:{1:false,2:false}, // 春日影
    showCardOverlay: null,  // card data to preview
    // 遙控骰子 waiting for +2 or -2 choice
    diceModPending: false,
  };
}

function setState(patch) {
  Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
  render();
}

// ─── Deck Helpers ─────────────────────────────────────────────────────────────
function drawCard(player) {
  if (state.hands[player].length >= MAX_HAND) return false;
  if (state.deck.length === 0) {
    // Reshuffle
    state.deck = buildDeck();
    addLog("🔀 牌組已抽完，重新洗牌！");
  }
  const card = state.deck.shift();
  state.hands[player] = [...state.hands[player], card];
  addLog(`P${player} 抽到【${card.name}】`);
  return true;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function getSkillForRoll(char, roll) {
  return char.skills.filter(s => roll >= s.range[0] && roll <= s.range[1]);
}
function getManhattanDist(r1,c1,r2,c2) {
  return Math.abs(r1-r2)+Math.abs(c1-c2);
}
function getSurroundingCells(r,c) {
  return [[r-1,c],[r+1,c],[r,c-1],[r,c+1],[r-1,c-1],[r-1,c+1],[r+1,c-1],[r+1,c+1]]
    .filter(([rr,cc])=>rr>=0&&rr<BOARD_ROWS&&cc>=0&&cc<BOARD_COLS);
}
function getAdjacentCells(r,c) {
  return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]
    .filter(([rr,cc])=>rr>=0&&rr<BOARD_ROWS&&cc>=0&&cc<BOARD_COLS);
}
function addLog(msg) {
  state.log = [msg, ...state.log.slice(0,12)];
}
function getMyUnit() { return state.board.find(u=>u.unit.player===state.currentPlayer); }
function getEnemyUnit() { return state.board.find(u=>u.unit.player!==state.currentPlayer); }
function getCellSize() {
  const w = Math.min(window.innerWidth, 500);
  return Math.floor((w - 32 - 2*(BOARD_COLS-1)) / BOARD_COLS);
}

// ─── Trap trigger check ───────────────────────────────────────────────────────
function checkTrapAt(row, col, triggerPlayer) {
  // Find trap at this cell that is NOT owned by the triggering player
  const trapIdx = state.traps.findIndex(t => t.row===row && t.col===col);
  if (trapIdx < 0) return;
  const trap = state.traps[trapIdx];
  // Remove trap
  state.traps = state.traps.filter((_,i)=>i!==trapIdx);
  addLog(`⚡ ${trap.card.icon}【${trap.card.name}】陷阱觸發！（P${triggerPlayer}踩中）`);
  applyTrapEffect(trap.card, triggerPlayer, row, col);
}

function applyTrapEffect(card, victim, row, col) {
  switch(card.id) {
    case "銅鑼燒": {
      state.board = state.board.map(u => {
        if (u.unit.player !== victim) return u;
        const newHp = Math.min(u.unit.hp + 2, u.unit.maxHp);
        addLog(`${u.unit.name} 恢復 2 點血 (→${newHp})`);
        return {...u, unit:{...u.unit, hp:newHp}};
      });
      break;
    }
    case "獄門疆": {
      // End current action and apply root next turn
      addLog(`P${victim} 行動終止！下回合定身`);
      state.rootedTurns[victim] = (state.rootedTurns[victim]||0) + 1;
      // Force end the unit's action this step
      state.actionUsed = true;
      state.highlightCells = [];
      state.selectedAction = null;
      break;
    }
    case "星光連流擊": {
      // Move victim 2 more cells in their last movement direction
      // We track last move direction; for simplicity, push forward in their facing direction
      // Since we don't track direction, push toward center or just note it
      addLog(`P${victim} 星光連流擊：再移動2格（需手動移動）`);
      // We'll just show the log note — full directional tracking would require more refactor
      break;
    }
    case "抹茶巴菲": {
      state.dmgBonusNextAtk[victim] = (state.dmgBonusNextAtk[victim]||0) + 1;
      addLog(`P${victim} 下次攻擊傷害+1`);
      break;
    }
    case "上古詛咒": {
      state.dmgPenaltyTurns[victim] = (state.dmgPenaltyTurns[victim]||0) + 2;
      addLog(`P${victim} 受到上古詛咒，2回合傷害-1`);
      break;
    }
    case "散落樂高": {
      state.board = state.board.map(u => {
        if (u.unit.player !== victim) return u;
        const newHp = Math.max(0, u.unit.hp - 2);
        addLog(`${u.unit.name} 受到 2 點傷害 (→${newHp})`);
        const dead = newHp <= 0;
        if (dead) state.winner = victim === 1 ? 2 : 1;
        return {...u, unit:{...u.unit, hp:newHp}};
      });
      break;
    }
  }
}

// ─── Card Play Logic ──────────────────────────────────────────────────────────
function handleCardSelect(idx) {
  const hand = state.hands[state.currentPlayer];
  if (!hand[idx]) return;
  const card = hand[idx];
  // 伏牌 only usable on own turn (already restricted in render)
  // Check if already selecting this card → deselect
  if (state.selectedCard === idx) {
    state.selectedCard = null;
    state.cardMode = null;
    state.highlightCells = [];
    render();
    return;
  }
  state.selectedCard = idx;
  state.diceRoll = null;
  state.availableSkills = [];
  // Determine what we need from the player
  setupCardMode(card, idx);
}

function setupCardMode(card, idx) {
  const me = getMyUnit(), enemy = getEnemyUnit();
  switch(card.id) {
    case "遙控骰":
      // Will activate at next dice roll - just confirm
      state.diceBonusNextRoll[state.currentPlayer] = 1; // flag, choice made later
      state.diceModPending = true;
      removeCardFromHand(idx);
      state.selectedCard = null; state.cardMode = null;
      addLog(`P${state.currentPlayer} 使用【遙控骰子】，下次擲骰可±2`);
      render(); return;
    case "春日影":
      // Mark enemy must reroll
      state.forceRerollActive[state.currentPlayer === 1 ? 2 : 1] = true;
      removeCardFromHand(idx);
      state.selectedCard = null; state.cardMode = null;
      addLog(`P${state.currentPlayer} 使用【春日影】，敵方下次擲骰必須重擲`);
      render(); return;
    case "瞬身之術": {
      // Highlight surrounding cells of own unit
      if (!me) return;
      const cells = [];
      getSurroundingCells(me.row, me.col).forEach(([r,c]) => {
        if (!state.board.find(u=>u.row===r&&u.col===c) && !state.blockedCells.find(b=>b.r===r&&b.c===c))
          cells.push({r,c,color:"#74b9ff"});
      });
      state.highlightCells = cells;
      state.cardMode = "瞬身之術";
      state.selectedAction = "card_target";
      render(); return;
    }
    case "不義遊戲": {
      // Swap both units - auto execute if 2 units
      if (!me || !enemy) { addLog("場上沒有足夠單位"); state.selectedCard=null; render(); return; }
      const mr=me.row,mc=me.col,er=enemy.row,ec=enemy.col;
      state.board = state.board.map(u => {
        if (u.unit.player===state.currentPlayer) return {...u,row:er,col:ec};
        return {...u,row:mr,col:mc};
      });
      addLog(`P${state.currentPlayer} 使用【不義遊戲】，雙方交換位置`);
      // Check traps at new positions
      checkTrapAt(er,ec,state.currentPlayer);
      checkTrapAt(mr,mc,state.currentPlayer===1?2:1);
      removeCardFromHand(idx);
      state.selectedCard=null; state.cardMode=null; state.highlightCells=[];
      render(); return;
    }
    default: {
      // Trap cards: set on board
      if (card.type === "伏") {
        const cells = [];
        for (let r=0;r<BOARD_ROWS;r++) for (let c=0;c<BOARD_COLS;c++) {
          if (!state.board.find(u=>u.row===r&&u.col===c) &&
              !state.blockedCells.find(b=>b.r===r&&b.c===c) &&
              !state.traps.find(t=>t.row===r&&t.col===c))
            cells.push({r,c,color:"#00b894"});
        }
        state.highlightCells = cells;
        state.cardMode = "set_trap";
        state.selectedAction = "card_trap";
        render();
      }
      break;
    }
  }
}

function handleCardTargetCell(r, c) {
  const idx = state.selectedCard;
  if (idx === null || idx === undefined) return;
  const card = state.hands[state.currentPlayer][idx];
  if (!card) return;

  if (state.cardMode === "瞬身之術") {
    const me = getMyUnit();
    if (!me) return;
    state.board = state.board.map(u => u.unit.player===state.currentPlayer ? {...u,row:r,col:c} : u);
    addLog(`P${state.currentPlayer} 瞬身至(${r+1},${c+1})`);
    checkTrapAt(r,c,state.currentPlayer);
    removeCardFromHand(idx);
  } else if (state.cardMode === "set_trap") {
    state.traps = [...state.traps, {row:r, col:c, card:{...card}, owner:state.currentPlayer}];
    addLog(`P${state.currentPlayer} 將【${card.name}】置於(${r+1},${c+1})`);
    removeCardFromHand(idx);
  }
  state.selectedCard=null; state.cardMode=null; state.highlightCells=[];
  state.selectedAction=null;
  render();
}

function removeCardFromHand(idx) {
  const hand = [...state.hands[state.currentPlayer]];
  hand.splice(idx, 1);
  state.hands = {...state.hands, [state.currentPlayer]: hand};
}

// ─── Game Logic ───────────────────────────────────────────────────────────────
function handleCharSelect(name) {
  if (state.setupStep===1) { state.p1Char=CHARACTERS[name]; state.setupStep=2; }
  else if (state.setupStep===3) { state.p2Char=CHARACTERS[name]; state.setupStep=4; }
  render();
}

function handleCellClickSetup(r,c) {
  if (state.board.find(u=>u.row===r&&u.col===c)) return;
  if (state.setupStep===2) {
    if (c>2) return;
    state.board = [{row:r,col:c,unit:{...state.p1Char,player:1,armor:0}}];
    state.setupStep = 3;
  } else if (state.setupStep===4) {
    if (c<4) return;
    state.board = [...state.board, {row:r,col:c,unit:{...state.p2Char,player:2,armor:0}}];
    state.phase = "game";
    // Init deck and give no starting cards; draw on first rest
    state.deck = buildDeck();
    state.hands = {1:[], 2:[]};
    addLog("雙方就位，戰鬥開始！P1先手。");
  }
  render();
}

function handleActionSelect(action) {
  if (state.actionUsed||state.winner) return;
  // Cancel card selection if switching action
  state.selectedCard = null; state.cardMode = null;
  state.selectedAction = action;
  state.highlightCells = []; state.diceRoll = null;
  state.availableSkills = []; state.selectedSkill = null;
  if (action==="move") {
    const me = getMyUnit(); if (!me) return;
    // Check rooted
    if (state.rootedTurns[state.currentPlayer] > 0) {
      addLog(`P${state.currentPlayer} 定身中，無法移動`);
      state.selectedAction = null; render(); return;
    }
    const cells = [];
    for (let r=0;r<BOARD_ROWS;r++) for (let c=0;c<BOARD_COLS;c++) {
      const d = getManhattanDist(me.row,me.col,r,c);
      if (d>0&&d<=me.unit.move&&!state.board.find(u=>u.row===r&&u.col===c)&&!state.blockedCells.find(b=>b.r===r&&b.c===c))
        cells.push({r,c,color:"#f39c12"});
    }
    state.highlightCells = cells;
  }
  if (action==="rest") doRest();
  else render();
}

function doRest() {
  state.board = state.board.map(u => {
    if (u.unit.player!==state.currentPlayer) return u;
    const half = Math.ceil(u.unit.maxHp * REST_CAP_RATIO);
    if (u.unit.hp>=half) { addLog(`${u.unit.name}休息，血量已達半血上限`); return u; }
    const newHp = Math.min(u.unit.hp+REST_HEAL, half);
    addLog(`${u.unit.name}休息，回復1滴血(${u.unit.hp}→${newHp})`);
    return {...u, unit:{...u.unit, hp:newHp}};
  });
  // Draw a card on rest
  drawCard(state.currentPlayer);
  state.actionUsed = true; state.selectedAction = null; state.highlightCells = [];
  render();
}

function handleCellClickGame(r,c) {
  // Card target modes
  if (state.selectedAction==="card_target" || state.selectedAction==="card_trap") {
    if (!state.highlightCells.find(h=>h.r===r&&h.c===c)) {
      state.selectedCard=null; state.cardMode=null; state.highlightCells=[]; state.selectedAction=null; render(); return;
    }
    handleCardTargetCell(r, c);
    return;
  }
  if (!state.selectedAction||state.actionUsed||state.winner) return;
  if (state.selectedAction==="move") {
    if (!state.highlightCells.find(h=>h.r===r&&h.c===c)) { state.highlightCells=[]; state.selectedAction=null; render(); return; }
    const myName = getMyUnit()?.unit.name || "角色";
    state.board = state.board.map(u=>u.unit.player===state.currentPlayer?{...u,row:r,col:c}:u);
    addLog(`${myName}移動至(${r+1},${c+1})`);
    state.highlightCells=[]; state.selectedAction=null; state.actionUsed=true;
    // Check trap at destination
    checkTrapAt(r, c, state.currentPlayer);
    render();
  }
  if (state.selectedAction==="skill_target"&&state.selectedSkill) {
    if (!state.highlightCells.find(h=>h.r===r&&h.c===c)) { state.highlightCells=[]; state.selectedAction=null; render(); return; }
    applySkillEffect(state.selectedSkill, r, c);
  }
  if (state.selectedAction==="shoot_move_step2") {
    if (!state.highlightCells.find(h=>h.r===r&&h.c===c)) { state.highlightCells=[]; state.selectedAction=null; render(); return; }
    state.board = state.board.map(u=>u.unit.player===state.currentPlayer?{...u,row:r,col:c}:u);
    addLog(`閃擊射後移至(${r+1},${c+1})`);
    state.highlightCells=[]; state.selectedAction=null; state.actionUsed=true;
    checkTrapAt(r, c, state.currentPlayer);
    const dead = state.board.find(u=>u.unit.hp<=0);
    if (dead) state.winner = dead.unit.player===1?2:1;
    render();
  }
}

function rollDice() {
  if (state.actionUsed||state.winner) return;
  state.rollAnim = true; render();
  setTimeout(()=>{
    let roll = Math.floor(Math.random()*DICE_SIDES)+1;
    // 春日影: force reroll
    if (state.forceRerollActive[state.currentPlayer]) {
      state.forceRerollActive[state.currentPlayer] = false;
      addLog(`春日影！P${state.currentPlayer}強制重擲骰子`);
      roll = Math.floor(Math.random()*DICE_SIDES)+1;
    }
    state.diceRoll = roll; state.rollAnim = false;
    // 遙控骰子: ask +2/-2 choice
    if (state.diceModPending) {
      state.diceModPending = false;
      state.diceBonusNextRoll[state.currentPlayer] = 0;
      state.pendingRollBase = roll;
      state.selectedAction = "dice_mod_choice";
      addLog(`遙控骰子啟動！擲出${roll}，選擇±2`);
      render(); return;
    }
    const me = getMyUnit(); if (!me) return;
    const skills = getSkillForRoll(me.unit, roll);
    state.availableSkills = skills;
    if (skills.length===0) {
      addLog(`擲出${roll}！沒有可用技能，自動結束回合`);
      state.diceRoll=roll; state.rollAnim=false; state.actionUsed=true;
      render();
      setTimeout(()=>{ endTurn(); }, 900);
    } else {
      addLog(`擲出${roll}！可用：${skills.map(s=>s.name).join("或")}`);
      render();
    }
  }, 600);
}

function applyDiceMod(delta) {
  const base = state.pendingRollBase;
  const roll = Math.max(1, Math.min(DICE_SIDES, base + delta));
  state.diceRoll = roll;
  state.pendingRollBase = null;
  state.selectedAction = null;
  addLog(`遙控骰子：${base} ${delta>0?"+":""} ${delta} → ${roll}`);
  const me = getMyUnit();
  const skills = getSkillForRoll(me.unit, roll);
  state.availableSkills = skills;
  if (skills.length===0) {
    addLog(`${roll}沒有可用技能，自動結束回合`);
    state.actionUsed=true; render();
    setTimeout(()=>{ endTurn(); }, 900);
  } else {
    addLog(`可用：${skills.map(s=>s.name).join("或")}`);
    render();
  }
}

function handleSkillSelect(skill) {
  state.selectedSkill = skill;
  const me = getMyUnit(), enemy = getEnemyUnit();
  if (!me||!enemy) return;
  const [mr,mc] = [me.row, me.col];
  let cells = [];
  const eff = skill.effect;
  if (["aoe_around_1","armor_aoe2"].includes(eff)) {
    cells = getSurroundingCells(mr,mc).filter(([r,c])=>state.board.find(u=>u.row===r&&u.col===c&&u.unit.player!==state.currentPlayer&&!state.stealthActive[u.unit.player])).map(([r,c])=>({r,c,color:"#d63031"}));
  }
  if (["adj_2dmg","knockback"].includes(eff)) {
    cells = getAdjacentCells(mr,mc).filter(([r,c])=>state.board.find(u=>u.row===r&&u.col===c&&u.unit.player!==state.currentPlayer&&!state.stealthActive[u.unit.player])).map(([r,c])=>({r,c,color:"#d63031"}));
  }
  if (["line_2_1dmg","shoot_move"].includes(eff)) {
    const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for (const [dr,dc] of dirs) for (let d=1;d<=LINE_RANGE;d++) {
      const rr=mr+dr*d, cc=mc+dc*d;
      if (rr<0||rr>=BOARD_ROWS||cc<0||cc>=BOARD_COLS) break;
      const hit=state.board.find(u=>u.row===rr&&u.col===cc);
      if (hit&&hit.unit.player!==state.currentPlayer&&!state.stealthActive[hit.unit.player]) cells.push({r:rr,c:cc,color:"#d63031"});
      if (hit) break;
    }
  }
  if (eff==="line_pierce") {
    state.highlightCells = []; state.selectedAction = "pierce_menu"; render(); return;
  }
  if (eff==="stealth_move") {
    for(let r=0;r<BOARD_ROWS;r++) for(let c=0;c<BOARD_COLS;c++){
      const d=getManhattanDist(mr,mc,r,c);
      if(d>0&&d<=STEALTH_MOVE_RANGE&&!state.board.find(u=>u.row===r&&u.col===c)) cells.push({r,c,color:"#00b894"});
    }
    if(cells.length===0){addLog("暗影步：周圍無空格可移動");state.actionUsed=true;state.selectedAction=null;render();return;}
    state.highlightCells=cells; state.selectedAction="skill_target"; render(); return;
  }
  if (eff==="parry") { applySkillEffect(skill,null,null); return; }
  if (eff==="true_dmg_injured") { applySkillEffect(skill,enemy.row,enemy.col); return; }
  if (cells.length===0) { addLog(`${skill.name}：沒有可攻擊目標`); state.actionUsed=true; state.selectedAction=null; state.highlightCells=[]; render(); return; }
  state.highlightCells = cells; state.selectedAction = "skill_target";
  render();
}

function applySkillEffect(skill, tr, tc) {
  const me = getMyUnit(); if (!me) return;
  let newBoard = [...state.board], newBlocked = [...state.blockedCells];
  let logMsg = `${me.unit.name}發動【${skill.name}】`;

  function dealDamage(targetUnit, dmg, isTrueDmg=false) {
    if (state.stealthActive[targetUnit.unit.player]) {
      state.stealthActive={...state.stealthActive,[targetUnit.unit.player]:false};
      logMsg+=` [潛行抵消]`;
      return targetUnit.unit.hp;
    }
    let d = dmg;
    const my = newBoard.find(u=>u.unit.player===state.currentPlayer);
    if (my&&my.unit.name==="遊俠"&&state.rangePowerNextTurn[state.currentPlayer]) d+=1;
    // Card bonus/penalty
    if (state.dmgBonusNextAtk[state.currentPlayer] > 0) { d += state.dmgBonusNextAtk[state.currentPlayer]; state.dmgBonusNextAtk[state.currentPlayer]=0; logMsg+="（抹茶+1）"; }
    if (state.dmgPenaltyTurns[state.currentPlayer] > 0) { d = Math.max(0, d-1); logMsg+="（詛咒-1）"; }
    if (!isTrueDmg&&targetUnit.unit.armor>0) { d=Math.max(0,d-1); newBoard=newBoard.map(u=>u.unit.player===targetUnit.unit.player?{...u,unit:{...u.unit,armor:u.unit.armor-1}}:u); logMsg+="（裝甲）"; }
    if (targetUnit.unit.name==="劍士"&&!isTrueDmg) { const pr=Math.floor(Math.random()*6)+1; if(pr<=2){d=Math.max(0,d-1);logMsg+="（振刀-1）";} }
    const newHp = Math.max(0, targetUnit.unit.hp-d);
    if(d>0) state.dealtDamageThisTurn=true;
    logMsg += ` 造成${d}點${isTrueDmg?"真":""}傷(${targetUnit.unit.hp}→${newHp})`;
    newBoard = newBoard.map(u=>u.row===targetUnit.row&&u.col===targetUnit.col?{...u,unit:{...u.unit,hp:newHp}}:u);
    if (state.parryActive[targetUnit.unit.player]&&d>0&&!isTrueDmg) {
      const attacker = newBoard.find(u=>u.unit.player===state.currentPlayer);
      if (attacker) { const aHp=Math.max(0,attacker.unit.hp-1); newBoard=newBoard.map(u=>u.unit.player===state.currentPlayer?{...u,unit:{...u.unit,hp:aHp}}:u); logMsg+=` 彈反！`; }
      state.parryActive = {...state.parryActive, [targetUnit.unit.player]:false};
    }
    if (newHp===0&&me.unit.name==="爪牙") { newBoard=newBoard.map(u=>u.unit.player===state.currentPlayer?{...u,unit:{...u.unit,hp:u.unit.maxHp}}:u); logMsg+="嗜血！"; }
    return newHp;
  }

  switch (skill.effect) {
    case "aoe_around_1":
      getSurroundingCells(me.row,me.col).forEach(([r,c])=>{const t=newBoard.find(u=>u.row===r&&u.col===c&&u.unit.player!==state.currentPlayer);if(t)dealDamage(t,1);}); break;
    case "adj_2dmg": { const t=newBoard.find(u=>u.row===tr&&u.col===tc); if(t)dealDamage(t,2); break; }
    case "knockback": {
      const t=newBoard.find(u=>u.row===tr&&u.col===tc);
      if(t){const dr=t.row-me.row,dc=t.col-me.col,nr=t.row+Math.sign(dr),nc=t.col+Math.sign(dc);
        const can=nr>=0&&nr<BOARD_ROWS&&nc>=0&&nc<BOARD_COLS&&!newBoard.find(u=>u.row===nr&&u.col===nc);
        if(can){newBoard=newBoard.map(u=>u.row===t.row&&u.col===t.col?{...u,row:nr,col:nc}:u);logMsg+=` 擊退→(${nr+1},${nc+1})`;} else dealDamage(t,KNOCKBACK_DMG);}
      break; }
    case "line_2_1dmg": { const t=newBoard.find(u=>u.row===tr&&u.col===tc); if(t) dealDamage(t,1); break; }
    case "shoot_move": {
      const t=newBoard.find(u=>u.row===tr&&u.col===tc);
      if(t) dealDamage(t,1);
      addLog(logMsg);
      state.board=newBoard; state.blockedCells=newBlocked;
      state.rangePowerNextTurn={...state.rangePowerNextTurn,[state.currentPlayer]:false};
      const moveCells=[];
      const myPos=newBoard.find(u=>u.unit.player===state.currentPlayer);
      if(myPos){
        getSurroundingCells(myPos.row,myPos.col).forEach(([r,c])=>{
          if(!newBoard.find(u=>u.row===r&&u.col===c)) moveCells.push({r,c,color:"#00b894"});
        });
      }
      if(moveCells.length===0){
        state.highlightCells=[]; state.selectedAction=null; state.selectedSkill=null; state.actionUsed=true;
        const dead2=newBoard.find(u=>u.unit.hp<=0); if(dead2) state.winner=dead2.unit.player===1?2:1;
        render(); return;
      }
      state.highlightCells=moveCells; state.selectedAction="shoot_move_step2"; state.selectedSkill=null;
      render(); return; }
    case "line_pierce": {
      const isHoriz = skill._pierceRow !== null && skill._pierceRow !== undefined;
      if(isHoriz){
        const targetRow = skill._pierceRow;
        for(let c=0;c<BOARD_COLS;c++){const t=newBoard.find(u=>u.row===targetRow&&u.col===c);if(t) dealDamage(t,1);}
        logMsg+=` 裂空箭貫穿第${targetRow+1}橫排`;
      } else {
        const targetCol = skill._pierceCol;
        for(let r=0;r<BOARD_ROWS;r++){const t=newBoard.find(u=>u.row===r&&u.col===targetCol);if(t) dealDamage(t,1);}
        logMsg+=` 裂空箭貫穿第${skill._pierceCol+1}縱排`;
      }
      delete skill._pierceRow; delete skill._pierceCol;
      break; }
    case "true_dmg_injured": { const t=newBoard.find(u=>u.unit.player!==state.currentPlayer); if(t&&t.unit.hp<t.unit.maxHp)dealDamage(t,1,true); break; }
    case "stealth_move": {
      newBoard=newBoard.map(u=>u.unit.player===state.currentPlayer?{...u,row:tr,col:tc}:u);
      state.stealthActive={...state.stealthActive,[state.currentPlayer]:true};
      logMsg+=`→(${tr+1},${tc+1})並潛行`;
      // Check trap
      state.board=newBoard; state.blockedCells=newBlocked;
      checkTrapAt(tr,tc,state.currentPlayer);
      newBoard=[...state.board];
      break; }
    case "parry": state.parryActive={...state.parryActive,[state.currentPlayer]:true}; logMsg+=" ⚡彈反就緒"; break;
  }

  addLog(logMsg);
  state.board = newBoard; state.blockedCells = newBlocked;
  state.highlightCells=[]; state.selectedAction=null; state.selectedSkill=null; state.actionUsed=true;
  state.rangePowerNextTurn = {...state.rangePowerNextTurn, [state.currentPlayer]:false};
  const dead = newBoard.find(u=>u.unit.hp<=0);
  if (dead) state.winner = dead.unit.player===1?2:1;
  render();
}

function endTurn() {
  if (!state.actionUsed||state.winner) return;
  const next = state.currentPlayer===1?2:1;
  const me = getMyUnit();
  if (me&&me.unit.name==="遊俠"&&!state.dealtDamageThisTurn) {
    state.rangePowerNextTurn = {...state.rangePowerNextTurn, [state.currentPlayer]:true};
    addLog("遊俠養精蓄銳，下回合攻擊+1");
  }
  // Decrement penalty turns
  if (state.dmgPenaltyTurns[state.currentPlayer] > 0) {
    state.dmgPenaltyTurns[state.currentPlayer]--;
  }
  if (state.rootedTurns[state.currentPlayer] > 0) {
    state.rootedTurns[state.currentPlayer]--;
  }
  addLog(`── 換 P${next} 的回合 ──`);
  state.stealthActive={...state.stealthActive,[next]:false};
  state.currentPlayer = next;
  state.actionUsed=false; state.selectedAction=null; state.diceRoll=null;
  state.availableSkills=[]; state.selectedSkill=null; state.highlightCells=[];
  state.dealtDamageThisTurn=false; state.selectedCard=null; state.cardMode=null;
  state.blockedCells = state.blockedCells.filter(b => b.owner === next);
  render();
}

function resetGame() {
  state = createInitialState();
  render();
}

// ─── Render Helpers ───────────────────────────────────────────────────────────
function hpBarColor(pct) {
  return pct>50?"#00b894":pct>25?"#fdcb6e":"#d63031";
}
function renderHpBar(hp, maxHp) {
  const pct = Math.max(0, hp/maxHp)*100;
  return `<div class="hp-bar-wrap"><div class="hp-bar" style="width:${pct}%;background:${hpBarColor(pct)}"></div></div>`;
}

function renderCell(unit, hl, blocked, r, c, sz) {
  const isStealthed = unit && state.stealthActive[unit.player];
  const trap = state.traps.find(t=>t.row===r&&t.col===c);
  const border = hl ? `2px solid ${hl.color||"#f39c12"}` : isStealthed ? "1px dashed #00b894" : "1px solid #2a2a40";
  const bg = blocked ? "#3d1a1a" : hl ? `${hl.color||"#f39c12"}22` : isStealthed ? "#00200f" : "#0b0b1e";
  const shadow = unit ? `inset 0 0 ${sz*0.2}px ${unit.glowColor}55` : "none";
  const radius = Math.max(3, sz*0.08);
  let inner = "";
  if (blocked) inner = `<div style="font-size:${sz*0.3}px;opacity:0.5">🚧</div>`;
  else if (unit) inner = `<div class="cell-content" style="${isStealthed?"opacity:0.55":""}">
    <div style="font-size:${sz*0.38}px">${unit.icon}${isStealthed?`<span style="font-size:${sz*0.22}px">👁️</span>`:""}</div>
    <div style="font-size:${sz*0.14}px;color:${unit.player===1?"#74b9ff":"#ff7675"};font-weight:700">${unit.player===1?"P1":"P2"}</div>
    <div style="font-size:${sz*0.13}px;color:#aaa">${unit.hp}/${unit.maxHp}</div>
  </div>`;
  const trapIcon = trap ? `<div class="trap-icon">${trap.card.icon}</div>` : "";
  return `<div class="cell${hl?" highlight":""}" onclick="handleCellClick(${r},${c})"
    style="width:${sz}px;height:${sz}px;border:${border};border-radius:${radius}px;background:${bg};box-shadow:${shadow};cursor:${hl?"pointer":"default"}"
  >${inner}${trapIcon}</div>`;
}

function handleCellClick(r, c) {
  if (state.phase==="setup") handleCellClickSetup(r,c);
  else handleCellClickGame(r,c);
}

function firePierce(isHoriz, index) {
  if (!state.selectedSkill) return;
  state.selectedSkill._pierceRow = isHoriz ? index : null;
  state.selectedSkill._pierceCol = isHoriz ? null : index;
  applySkillEffect(state.selectedSkill, 0, 0);
}

function renderBoard(sz) {
  let html = `<div class="board" style="grid-template-columns:repeat(${BOARD_COLS},${sz}px);gap:2px">`;
  for (let r=0;r<BOARD_ROWS;r++) for (let c=0;c<BOARD_COLS;c++) {
    const cell = state.board.find(u=>u.row===r&&u.col===c);
    const blocked = state.blockedCells.find(b=>b.r===r&&b.c===c);
    const hl = state.highlightCells.find(h=>h.r===r&&h.c===c);
    html += renderCell(cell?.unit, hl, !!blocked, r, c, sz);
  }
  html += "</div>";
  return html;
}

function renderCardHand(player) {
  const hand = state.hands[player];
  const isCurrentPlayer = player === state.currentPlayer;
  const cpColor = player===1?"#74b9ff":"#ff7675";
  const deckCount = state.deck.length;

  let html = `<div class="panel" style="border:1px solid ${cpColor}44;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <div style="font-size:10px;color:${cpColor};letter-spacing:1px">🃏 P${player} 手牌 (${hand.length}/${MAX_HAND})</div>
      <div style="font-size:9px;color:#555">牌庫 ${deckCount}張</div>
    </div>`;

  if (hand.length === 0) {
    html += `<div style="font-size:10px;color:#444;padding:4px">無手牌（休息時抽牌）</div>`;
  } else {
    html += `<div class="card-hand">`;
    hand.forEach((card, idx) => {
      const isSelected = isCurrentPlayer && state.selectedCard === idx;
      // Disable if: not current player's turn, or if action already used and it's not a 法 card being played anytime
      // 法 cards can be used anytime (even after action, but let's follow: 法=anytime, 伏=own turn only)
      // Actually per rules: 法=any time, 伏=own turn only + set on board
      const isMine = isCurrentPlayer;
      const isFu = card.type === "伏";
      const canPlay = isMine && (!isFu || !state.actionUsed);
      // For 法 cards: always playable (anytime)
      // For 伏 cards: only own turn, but don't consume action (they get placed)
      const disabledClass = (!isMine || (isFu && state.winner)) ? "card-disabled" : "";
      const typeClass = card.type === "法" ? "card-fa" : "card-fu";
      const selectedClass = isSelected ? "card-selected" : "";
      const badgeClass = card.type === "法" ? "card-badge-fa" : "card-badge-fu";
      html += `<div class="card-item ${typeClass} ${selectedClass} ${disabledClass}"
        onclick="handleCardSelect(${idx})"
        style="border-color:${isSelected?'#fdcb6e':card.color}44">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
          <span style="font-size:14px">${card.icon}</span>
          <span class="card-badge ${badgeClass}">${card.type}</span>
        </div>
        <div style="font-size:9px;color:#eee;font-weight:700;line-height:1.2;margin-bottom:2px">${card.name}</div>
        <div style="font-size:8px;color:#888;line-height:1.3">${card.desc.length > 30 ? card.desc.slice(0,30)+'…' : card.desc}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderSetup(sz) {
  const pickingPlayer = state.setupStep<=2?1:2;
  const isPickingChar = state.setupStep===1||state.setupStep===3;
  const isPlacing = state.setupStep===2||state.setupStep===4;
  const charNames = Object.keys(CHARACTERS);
  let html = `<div style="min-height:100vh;background:#07071a;color:#eee;font-family:'Noto Sans TC',sans-serif;padding:16px;max-width:520px;margin:0 auto">
    <h1 style="font-family:'Noto Serif TC',serif;font-size:24px;color:#a29bfe;letter-spacing:5px;text-shadow:0 0 20px #6c5ce7;text-align:center;margin-bottom:4px">⚙️ 械式對決</h1>
    <p style="color:#74b9ff;font-size:11px;letter-spacing:3px;text-align:center;margin-bottom:18px">CARD BATTLE SYSTEM</p>
    <div class="panel" style="border:1px solid #2d2d55;border-radius:12px;padding:16px">
      <h2 style="color:#fdcb6e;font-size:14px;letter-spacing:2px;margin-bottom:12px">👤 玩家${pickingPlayer} — ${isPickingChar?"選擇角色":"放置角色"}</h2>`;

  if (isPickingChar) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap">`;
    charNames.filter(n=>state.setupStep===3?n!==state.p1Char?.name:true).forEach(n=>{
      const ch = CHARACTERS[n];
      html += `<div class="char-card" onclick="handleCharSelect('${n}')"
        style="border:2px solid ${ch.color};background:${ch.color}15;box-shadow:0 0 10px ${ch.glowColor}44">
        <div style="font-size:26px">${ch.icon}</div>
        <div style="font-size:14px;color:#eee;font-weight:700;font-family:'Noto Serif TC',serif">${ch.name}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px">HP ${ch.hp} · 移${ch.move}</div>
        ${renderHpBar(ch.hp,ch.maxHp)}
        <div style="margin-top:6px;font-size:9px;color:#888;border-top:1px solid #2d2d44;padding-top:4px;text-align:left">
          ${ch.skills.map(s=>`<div style="margin-bottom:1px"><span style="color:#a29bfe">D${s.range[0]}-${s.range[1]}</span> ${s.name}</div>`).join("")}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (isPlacing) {
    const pColor = pickingPlayer===1?"#74b9ff":"#ff7675";
    html += `<p style="color:#aaa;font-size:11px;margin-bottom:8px;text-align:center">
      ${pickingPlayer===1?"在左側(前3列)放置角色":"在右側(後3列)放置角色"}</p>`;
    html += `<div class="board" style="grid-template-columns:repeat(${BOARD_COLS},${sz}px);gap:2px">`;
    for (let r=0;r<BOARD_ROWS;r++) for (let c=0;c<BOARD_COLS;c++) {
      const unit = state.board.find(u=>u.row===r&&u.col===c);
      const valid = (pickingPlayer===1&&c<=2)||(pickingPlayer===2&&c>=4);
      const hl = valid&&!unit ? {color:pColor} : null;
      html += renderCell(unit?.unit, hl, false, r, c, sz);
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderGame(sz) {
  const me = getMyUnit(), enemy = getEnemyUnit();
  const meUnit = me?.unit, enemyUnit = enemy?.unit;
  const cpColor = state.currentPlayer===1?"#74b9ff":"#ff7675";
  const cp = state.currentPlayer;
  const op = cp===1?2:1;

  let html = `<div style="max-width:520px;margin:0 auto">`;

  // Card preview overlay
  if (state.showCardOverlay) {
    const c = state.showCardOverlay;
    html += `<div class="overlay" onclick="setState({showCardOverlay:null})"><div class="overlay-box" style="border:2px solid ${c.color}">
      <div style="font-size:36px;margin-bottom:4px">${c.icon}</div>
      <h2 style="font-family:'Noto Serif TC',serif;font-size:16px;color:${c.color};margin-bottom:6px">${c.name}</h2>
      <div style="font-size:10px;margin-bottom:8px"><span class="card-badge ${c.type==="法"?"card-badge-fa":"card-badge-fu"}">${c.type}</span></div>
      <p style="color:#eee;font-size:12px;margin-bottom:8px;line-height:1.6">${c.desc}</p>
      <p style="color:#666;font-size:10px;font-style:italic;margin-bottom:14px">${c.flavor}</p>
      <button class="btn" onclick="setState({showCardOverlay:null})" style="background:#1e1e3a;color:#aaa;border:1px solid #444">關閉</button>
    </div></div>`;
  }

  // Confirm quit overlay
  if (state.confirmQuit) {
    html += `<div class="overlay"><div class="overlay-box" style="border:2px solid #e17055">
      <div style="font-size:36px;margin-bottom:8px">🏳️</div>
      <h2 style="font-family:'Noto Serif TC',serif;font-size:18px;color:#e17055;margin-bottom:6px">提前結束？</h2>
      <p style="color:#aaa;font-size:12px;margin-bottom:18px;line-height:1.6">確定要放棄本局嗎？<br/>目前進度將會清除。</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn" onclick="setState({confirmQuit:false})" style="background:#1e1e3a;color:#aaa;border:1px solid #444;padding:9px 18px">繼續遊戲</button>
        <button class="btn" onclick="resetGame()" style="background:#e17055;color:#fff;padding:9px 18px">確定放棄</button>
      </div>
    </div></div>`;
  }

  // Winner overlay
  if (state.winner) {
    html += `<div class="overlay"><div class="overlay-box" style="border:2px solid #fdcb6e">
      <div style="font-size:44px;margin-bottom:8px">🏆</div>
      <h2 style="font-family:'Noto Serif TC',serif;font-size:24px;color:#fdcb6e;margin-bottom:16px">玩家${state.winner}獲勝！</h2>
      <button class="btn" onclick="resetGame()" style="background:#a29bfe;color:#07071a;font-size:14px;padding:10px 24px">重新開始</button>
    </div></div>`;
  }

  // Header
  html += `<div class="header">
    <h1 style="font-size:18px;color:#a29bfe;letter-spacing:4px">⚙️ 械式對決</h1>
    <div style="display:flex;gap:6px">
      <button class="btn" onclick="setState({showInfo:!state.showInfo})" style="background:#1e1e3a;color:#a29bfe;border:1px solid #6c5ce7;font-size:11px;padding:5px 9px">
        ${state.showInfo?"📖隱藏":"📖技能"}</button>
      <button class="btn" onclick="setState({confirmQuit:true})" style="background:#1e1e3a;color:#e17055;border:1px solid #e17055;font-size:11px;padding:5px 9px">🏳️投降</button>
    </div>
  </div>`;

  // Turn bar
  html += `<div class="turn-bar" style="border:1px solid ${cpColor};margin-bottom:8px">
    <div style="font-size:13px">🎮 玩家<b style="color:${cpColor}">${cp}</b>的回合
      ${state.rootedTurns[cp]>0?`<span style="color:#e17055;font-size:10px"> ⛓定身</span>`:""}
      ${state.dmgPenaltyTurns[cp]>0?`<span style="color:#b2bec3;font-size:10px"> 💀詛咒${state.dmgPenaltyTurns[cp]}回</span>`:""}
    </div>
    ${meUnit?`<div style="font-size:11px;color:#aaa;text-align:right">
      ${meUnit.icon} ${meUnit.name} HP ${meUnit.hp}/${meUnit.maxHp}
      ${meUnit.armor>0?`<span style="color:#fdcb6e"> 🛡${meUnit.armor}</span>`:""}
      ${state.parryActive[cp]?`<span style="color:#74b9ff"> ⚡彈反</span>`:""}
    </div>`:""}
  </div>`;

  // Skill info panel
  if (state.showInfo) {
    html += `<div class="info-panel">`;
    [meUnit,enemyUnit].filter(Boolean).forEach(u=>{
      html += `<div style="flex:1 1 120px;border-left:3px solid ${u.color};padding-left:6px">
        <div style="font-weight:700;color:${u.color};margin-bottom:3px">${u.icon} ${u.name}</div>
        <div style="color:#74b9ff;margin-bottom:2px">被動 ${u.passive?.name}：${u.passive?.desc}</div>
        ${u.skills.map(s=>`<div style="color:#aaa;margin-bottom:1px">
          <span style="color:#a29bfe">D${s.range[0]}-${s.range[1]}</span> <b style="color:#fdcb6e">${s.name}</b>：${s.desc}
        </div>`).join("")}
      </div>`;
    });
    html += `</div>`;
  }

  // Board
  html += renderBoard(sz);

  // Action buttons
  if (!state.winner) {
    html += `<div class="action-grid">
      <button class="btn btn-move${state.selectedAction==="move"?" active":""}" ${state.actionUsed?"disabled":""} onclick="handleActionSelect('move')">
        🚶移動<br><span style="font-size:10px;font-weight:400">(${meUnit?.move}格)</span></button>
      <button class="btn btn-skill" ${state.actionUsed?"disabled":""} onclick="doRollDice()">
        🎲放招<br><span style="font-size:10px;font-weight:400">${state.rollAnim?"擲中...":"D12"}</span></button>
      <button class="btn btn-rest" ${state.actionUsed?"disabled":""} onclick="handleActionSelect('rest')">
        💤休息<br><span style="font-size:10px;font-weight:400">+1血+抽牌</span></button>
      <button class="btn btn-end${state.actionUsed?" ready":""}" ${!state.actionUsed?"disabled":""} onclick="endTurn()">
        ⏭結束<br><span style="font-size:10px;font-weight:400">回合</span></button>
    </div>`;
  }

  // Dice mod choice
  if (state.selectedAction === "dice_mod_choice") {
    html += `<div class="panel" style="border:2px solid #fdcb6e;margin-bottom:8px;text-align:center">
      <div style="font-size:11px;color:#fdcb6e;margin-bottom:8px">🎲 遙控骰子：擲出 <b style="font-size:20px">${state.pendingRollBase}</b>，選擇調整</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn" onclick="applyDiceMod(2)" style="background:#1e1e3a;color:#00b894;border:1px solid #00b894;font-size:14px;padding:8px 20px">+2</button>
        <button class="btn" onclick="applyDiceMod(-2)" style="background:#1e1e3a;color:#e17055;border:1px solid #e17055;font-size:14px;padding:8px 20px">-2</button>
      </div>
    </div>`;
  }

  // Dice result
  if (state.diceRoll && state.selectedAction !== "dice_mod_choice") {
    html += `<div class="panel" style="border:1px solid #6c5ce7;margin-bottom:8px">
      <div style="font-size:12px;color:#a29bfe;margin-bottom:6px">🎲 擲出 <b style="font-size:22px;color:#fdcb6e">${state.diceRoll}</b></div>`;
    if (state.availableSkills.length>0) {
      html += `<div class="skill-list">`;
      state.availableSkills.forEach((s,i)=>{
        html += `<button class="btn" onclick="selectSkill(${i})" style="background:#1e1e3a;color:#fdcb6e;border:1px solid #fdcb6e;flex:1 1 auto">
          【${s.name}】<br><span style="font-size:9px;color:#aaa;font-weight:400">${s.desc}</span></button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Pierce menu
  if (state.selectedAction==="pierce_menu" && state.selectedSkill) {
    html += `<div class="panel" style="border:2px solid #e056fd;margin-bottom:8px">
      <div style="font-size:12px;color:#e056fd;margin-bottom:8px">🏹 裂空箭 — 選擇目標排</div>
      <div style="font-size:10px;color:#aaa;margin-bottom:6px">↔ 橫排</div>
      <div style="display:flex;gap:4px;margin-bottom:8px">
        ${Array.from({length:BOARD_ROWS},(_,i)=>`<button class="btn" onclick="firePierce(true,${i})" style="flex:1;background:#1e1e3a;color:#e056fd;border:1px solid #e056fd;padding:6px 0;font-size:11px">第${i+1}排</button>`).join("")}
      </div>
      <div style="font-size:10px;color:#aaa;margin-bottom:6px">↕ 縱排</div>
      <div style="display:flex;gap:4px;">
        ${Array.from({length:BOARD_COLS},(_,i)=>`<button class="btn" onclick="firePierce(false,${i})" style="flex:1;background:#1e1e3a;color:#a29bfe;border:1px solid #a29bfe;padding:6px 0;font-size:11px">第${i+1}列</button>`).join("")}
      </div>
    </div>`;
  }

  // HP bars
  html += `<div class="hp-bars-row">`;
  [me, enemy].filter(Boolean).forEach(unit=>{
    const u = unit.unit, isMe = u.player===state.currentPlayer;
    html += `<div class="hp-unit-box" style="border:1px solid ${isMe?u.color:"#2d2d44"};box-shadow:${isMe?`0 0 10px ${u.glowColor}33`:"none"}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span style="font-size:12px;font-weight:700;color:#eee">${u.icon} ${u.name} <span style="font-size:10px;color:${u.player===1?"#74b9ff":"#ff7675"}">P${u.player}</span></span>
        <span style="font-size:11px;color:#aaa">${u.hp}/${u.maxHp}${u.armor>0?` 🛡${u.armor}`:""}</span>
      </div>
      ${renderHpBar(u.hp,u.maxHp)}
    </div>`;
  });
  html += `</div>`;

  // ─── Card Hands ───────────────────────────────────────────────────────────
  // Show current player's hand interactable
  html += renderCardHand(cp);

  // Card instruction panel (when selecting card target)
  if (state.cardMode === "set_trap") {
    const card = state.hands[cp][state.selectedCard];
    html += `<div class="panel" style="border:1px solid #00b894;margin-bottom:8px">
      <div style="font-size:11px;color:#00b894">🪤 【${card?.name}】陷阱：選擇棋盤上的格子放置</div>
      <div style="font-size:9px;color:#555;margin-top:2px">敵我雙方移動到此格時觸發 · 點其他地方取消</div>
    </div>`;
  }
  if (state.cardMode === "瞬身之術") {
    html += `<div class="panel" style="border:1px solid #74b9ff;margin-bottom:8px">
      <div style="font-size:11px;color:#74b9ff">💨 瞬身之術：選擇目標格移動</div>
    </div>`;
  }

  // Traps on board summary
  if (state.traps.length > 0) {
    html += `<div class="panel" style="border:1px solid #2d2d44;margin-bottom:8px">
      <div style="font-size:9px;color:#6c5ce7;margin-bottom:4px;letter-spacing:2px">置場陷阱</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">`;
    state.traps.forEach(t => {
      const c = t.card;
      html += `<div style="font-size:9px;color:#aaa;background:#1a1a2e;border-radius:4px;padding:2px 6px">
        ${c.icon} (${t.row+1},${t.col+1}) P${t.owner}置
      </div>`;
    });
    html += `</div></div>`;
  }

  // Log
  html += `<div class="panel">
    <div style="font-size:9px;color:#6c5ce7;margin-bottom:4px;letter-spacing:2px">戰鬥記錄</div>
    ${state.log.slice(0,5).map((l,i)=>`<div style="font-size:10px;color:${i===0?"#fdcb6e":"#555"};line-height:1.5">${l}</div>`).join("")}
  </div>`;

  html += `</div>`;
  return html;
}

function doRollDice() {
  if (!state.actionUsed) {
    state.selectedAction = "skill";
    rollDice();
  }
}

function selectSkill(index) {
  handleSkillSelect(state.availableSkills[index]);
}

function render() {
  const sz = getCellSize();
  const app = document.getElementById("app");
  if (state.phase==="setup") app.innerHTML = renderSetup(sz);
  else app.innerHTML = `<div style="padding:0 0 20px">${renderGame(sz)}</div>`;
}

// Init
window.addEventListener("resize", render);
render();
</script>
</body>
</html>
